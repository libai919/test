name: Build Unsigned IPA (Fixed for Feather)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS 26.3 IPA
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Unsigned .app
        run: |
          xcodebuild clean build \
            -project MyAppTest.xcodeproj \
            -scheme MyAppTest \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO

      - name: Create Correct IPA Structure
        run: |
          rm -f MyAppTest.ipa
          mkdir -p ./Payload
          cp -R ./DerivedData/Build/Products/Release-iphoneos/MyAppTest.app ./Payload/
          zip -r -X MyAppTest.ipa Payload
          unzip -l MyAppTest.ipa | head -n 30
          ls -lh MyAppTest.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyAppTest-unsigned-IPA-iOS26
          path: ./MyAppTest.ipa
          retention-days: 1
